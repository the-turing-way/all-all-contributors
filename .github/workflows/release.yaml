name: Update Release Tags

on:
  release:
    types: [released]

jobs:
  update-major-version-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version information
        id: version
        run: |
          # Extract tag name (e.g., v1.2.3)
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Extract major version (e.g., v1)
          MAJOR_VERSION=$(echo $TAG | cut -d. -f1)
          echo "major=$MAJOR_VERSION" >> $GITHUB_OUTPUT

          echo "Updating $MAJOR_VERSION to point to $TAG"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update major version tag
        run: |
          TAG=${{ steps.version.outputs.tag }}
          MAJOR=${{ steps.version.outputs.major }}

          # Create or update the major version tag
          git tag -fa $MAJOR -m "Update $MAJOR to $TAG"
          git push origin $MAJOR --force

          echo "✅ Successfully updated $MAJOR tag to point to $TAG"
